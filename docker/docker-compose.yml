services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: perseptor-backend
    env_file:
      - path: ../.env
        required: false
    expose:
      - "5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-development}
      - FLASK_APP=app.py
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=5000
      - DATABASE_PATH=/app/data/perseptor.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - SESSION_EXPIRY_HOURS=${SESSION_EXPIRY_HOURS:-24}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      # AI Provider Keys (also configurable via Settings UI)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEFAULT_AI_PROVIDER=${DEFAULT_AI_PROVIDER:-openai}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4.1-2025-04-14}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ../modules:/app/modules
      - ../api:/app/api
      - ../Global_Sigma_Rules:/app/Global_Sigma_Rules:ro
      - perseptor-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - perseptor-network

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: perseptor-frontend
    ports:
      - "${NGINX_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - perseptor-network

volumes:
  perseptor-data:
    driver: local

networks:
  perseptor-network:
    driver: bridge
